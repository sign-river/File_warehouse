name: Build HDA-DeepSC Chinese IEEE fragment

on:
  push:
    branches:
      - main
    paths:
      - 'papers/HDA_DeepSC_IEEE_Fragment_CN/**'
      - '.github/workflows/build-hda-fragment-cn.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-xetex \
            texlive-lang-chinese \
            texlive-publishers \
            texlive-science \
            latexmk \
            pandoc \
            ghostscript \
            poppler-utils \
            fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib numpy python-docx

      - name: Generate figures and Word reference document
        working-directory: papers/HDA_DeepSC_IEEE_Fragment_CN
        run: |
          python generate_figures.py
          python make_reference_docx.py

      - name: Compile IEEE-style PDF
        working-directory: papers/HDA_DeepSC_IEEE_Fragment_CN
        run: |
          latexmk -xelatex -interaction=nonstopmode -halt-on-error fragment.tex

      - name: Generate editable Word draft
        working-directory: papers/HDA_DeepSC_IEEE_Fragment_CN
        run: |
          pandoc fragment_word.md \
            --from=markdown+tex_math_dollars \
            --citeproc \
            --bibliography=references.bib \
            --reference-doc=reference.docx \
            --resource-path=. \
            -o HDA_DeepSC_IEEE_Fragment_CN.docx

      - name: Prepare deliverables
        working-directory: papers/HDA_DeepSC_IEEE_Fragment_CN
        run: |
          mkdir -p dist
          cp fragment.pdf dist/HDA_DeepSC_IEEE_Fragment_CN.pdf
          cp HDA_DeepSC_IEEE_Fragment_CN.docx dist/
          cp fragment.tex fragment_word.md references.bib generate_figures.py make_reference_docx.py README.md dist/
          cp -r figures dist/
          zip -r dist/HDA_DeepSC_IEEE_Fragment_CN_Source.zip \
            fragment.tex fragment_word.md references.bib generate_figures.py make_reference_docx.py README.md figures
          pdfinfo fragment.pdf > dist/build_report.txt
          pdffonts fragment.pdf >> dist/build_report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HDA-DeepSC-IEEE-Fragment-CN
          path: papers/HDA_DeepSC_IEEE_Fragment_CN/dist/
          retention-days: 30
