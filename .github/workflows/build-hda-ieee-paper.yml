name: Build HDA-DeepSC IEEE paper

on:
  pull_request:
    paths:
      - "papers/HDA_DeepSC_IEEE_Revised/**"
      - ".github/workflows/build-hda-ieee-paper.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install document toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-publishers \
            latexmk \
            pandoc \
            poppler-utils \
            zip \
            rsync \
            curl
          python -m pip install --upgrade pip
          python -m pip install matplotlib numpy

      - name: Generate reproducible figures
        working-directory: papers/HDA_DeepSC_IEEE_Revised
        run: python generate_figures.py

      - name: Compile IEEE LaTeX manuscript
        working-directory: papers/HDA_DeepSC_IEEE_Revised
        run: |
          latexmk -pdf -interaction=nonstopmode -halt-on-error main.tex
          test -s main.pdf
          if grep -E "LaTeX Warning: (There were undefined references|Citation .* undefined)" main.log; then
            echo "Unresolved LaTeX references or citations detected."
            exit 1
          fi

      - name: Build editable English Word draft
        working-directory: papers/HDA_DeepSC_IEEE_Revised
        run: |
          curl -L \
            https://raw.githubusercontent.com/citation-style-language/styles/master/ieee.csl \
            -o ieee.csl
          pandoc paper_word.md \
            --from markdown+tex_math_dollars+pipe_tables \
            --standalone \
            --citeproc \
            --bibliography=references.bib \
            --csl=ieee.csl \
            --resource-path=. \
            -o HDA_DeepSC_IEEE_Draft.docx
          test -s HDA_DeepSC_IEEE_Draft.docx

      - name: Build editable Chinese Word draft
        working-directory: papers/HDA_DeepSC_IEEE_Revised
        run: |
          pandoc paper_chinese_word.md \
            --from markdown+tex_math_dollars+pipe_tables \
            --standalone \
            --citeproc \
            --bibliography=references.bib \
            --csl=ieee.csl \
            --resource-path=. \
            -o HDA_DeepSC_Chinese_Draft.docx
          test -s HDA_DeepSC_Chinese_Draft.docx

      - name: Inspect PDF properties and fonts
        working-directory: papers/HDA_DeepSC_IEEE_Revised
        run: |
          {
            echo "===== PDF metadata ====="
            pdfinfo main.pdf
            echo
            echo "===== Embedded fonts ====="
            pdffonts main.pdf
          } | tee build_report.txt
          if pdffonts main.pdf | tail -n +3 | awk 'NF && $4 != "yes" {bad=1} END {exit bad}'; then
            echo "All listed PDF fonts are embedded." | tee -a build_report.txt
          else
            echo "WARNING: At least one PDF font is not embedded. The draft package will still be uploaded, but the final submission PDF must be repaired." | tee -a build_report.txt
          fi

      - name: Assemble complete LaTeX project and outputs
        run: |
          set -euo pipefail
          SRC="$GITHUB_WORKSPACE/papers/HDA_DeepSC_IEEE_Revised"
          DIST="$GITHUB_WORKSPACE/dist"
          STAGE="$GITHUB_WORKSPACE/stage/HDA_DeepSC_IEEE_Revised"
          mkdir -p "$DIST" "$STAGE"

          rsync -a \
            --exclude='*.aux' \
            --exclude='*.bbl' \
            --exclude='*.blg' \
            --exclude='*.fdb_latexmk' \
            --exclude='*.fls' \
            --exclude='*.log' \
            --exclude='*.out' \
            --exclude='*.synctex.gz' \
            "$SRC/" "$STAGE/"

          cp "$SRC/main.pdf" \
            "$DIST/HDA_DeepSC_IEEE_Revised.pdf"
          cp "$SRC/HDA_DeepSC_IEEE_Draft.docx" \
            "$DIST/HDA_DeepSC_IEEE_Draft.docx"
          cp "$SRC/HDA_DeepSC_Chinese_Draft.docx" \
            "$DIST/HDA_DeepSC_Chinese_Draft.docx"
          cp "$SRC/build_report.txt" \
            "$DIST/build_report.txt"

          cd "$GITHUB_WORKSPACE/stage"
          zip -r \
            "$DIST/HDA_DeepSC_IEEE_Revised_Project.zip" \
            HDA_DeepSC_IEEE_Revised

      - name: Upload compiled paper package
        uses: actions/upload-artifact@v4
        with:
          name: HDA-DeepSC-IEEE-Revised
          path: dist/*
          if-no-files-found: error
          retention-days: 30
